/* ===================== VOIX ===================== */
let VOICES=[], vA=null, vB=null;
function pickVoices(){
  VOICES = speechSynthesis.getVoices();
  const fr = VOICES.filter(v=>/^fr/i.test(v.lang));
  const pool = fr.length?fr:VOICES;
  // voix A : préfère féminine; voix B : une autre voix distincte
  const female = pool.find(v=>/(elo|julie|aud|amelie|female|google|siri.*1|virginie|c[ée]line)/i.test(v.name));
  vA = female || pool[0] || null;
  vB = pool.find(v=>v!==vA) || vA;
}
speechSynthesis.onvoiceschanged = pickVoices;
pickVoices();

function speak(text, who, onend){
  const u = new SpeechSynthesisUtterance(text);
  u.lang='fr-FR';
  if(who==='B'){ u.voice=vB; u.pitch=0.85; u.rate=1.02; }
  else { u.voice=vA; u.pitch=1.05; u.rate=0.97; }
  if(onend) u.onend=onend;
  speechSynthesis.speak(u);
  return u;
}
function stopSpeak(){ speechSynthesis.cancel(); }

/* ===================== ÉVALUATION RÉPONSE ===================== */
function norm(s){return s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").trim();}
function evaluer(rep, kgroups){
  const r = norm(rep); if(!r) return false;
  const mots = new Set(r.replace(/[,.''-]/g," ").split(/\s+/));
  let ok=0;
  for(const g of kgroups){
    if(g.some(syn=>{const s=norm(syn); return /[ \-\/]/.test(s)? r.includes(s): mots.has(s);})) ok++;
  }
  return ok >= Math.ceil(kgroups.length/2);
}

/* ===================== RECONNAISSANCE VOCALE (optionnelle) ===================== */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let reco=null;
function listen(onResult){
  if(!SR){ alert("La saisie vocale n'est pas dispo sur ce navigateur — tape ta réponse."); return; }
  reco = new SR(); reco.lang='fr-FR'; reco.interimResults=false; reco.maxAlternatives=1;
  reco.onresult = e=> onResult(e.results[0][0].transcript);
  reco.onerror = ()=>{};
  reco.start();
}

      <span class="emo">🎓</span><span><b>Examen blanc</b><small>15 questions, les 3 matières mélangées, noté /20</small></span></button>
    </div>
    <div class="note">Mets le son 🔊. Le mode podcast lit le cours à 2 voix.<br>
    Astuce : « Partager → Sur l'écran d'accueil » pour l'avoir comme une appli.</div>`);
}

function matiere(key){
  const m=MATIERES[key];
  h(`<div class="top"><button class="back" onclick="home()">←</button><b>${m.emo} ${m.nom}</b></div>
    <div class="grid">
      <button class="btn" onclick="podcast('${key}')"><span class="emo">🎙️</span>
        <span><b>Écouter le cours</b><small>Émission à 2 voix, type podcast</small></span></button>
      <button class="btn" onclick="quiz('${key}')"><span class="emo">❓</span>
        <span><b>Quiz</b><small>Il t'interroge et corrige à l'oral</small></span></button>
    </div>`);
}

/* ----- PODCAST ----- */
let pIdx=0, pArr=[], pPlaying=false, pKey=null;
function podcast(key){
  pKey=key; pArr=MATIERES[key].podcast; pIdx=0; pPlaying=true;
  renderPodcast(); playLine();
}
function renderPodcast(){
  const m=MATIERES[pKey];
  let lines = pArr.map((l,i)=>`<div class="speaker ${i===pIdx?'active':''}" id="sp${i}">
    <div class="av av${l.v}">${l.v==='A'?'👩‍🏫':'🧑‍🎓'}</div><div class="bub">${l.t}</div></div>`).join("");
  h(`<div class="top"><button class="back" onclick="go(()=>matiere('${pKey}'))">←</button><b>🎙️ ${m.nom}</b></div>
    <div class="progress"><i style="width:${(pIdx+1)/pArr.length*100}%"></i></div>
    ${lines}
    <div class="row">
      <button class="ghost" onclick="pPrev()">⏮︎</button>
      <button onclick="pToggle()" id="ppBtn">${pPlaying?'⏸︎ Pause':'▶︎ Lire'}</button>
      <button class="ghost" onclick="pNext()">⏭︎</button>
    </div>`);
  const el=document.getElementById('sp'+pIdx); if(el) el.scrollIntoView({block:'center',behavior:'smooth'});
}
function playLine(){
  if(pIdx>=pArr.length){pPlaying=false;renderPodcast();return;}
  renderPodcast();
  speak(pArr[pIdx].t, pArr[pIdx].v, ()=>{ if(pPlaying){ pIdx++; if(pIdx<pArr.length) playLine(); else {pPlaying=false; renderPodcast();} }});
}
function pToggle(){ if(pPlaying){pPlaying=false;stopSpeak();renderPodcast();} else {pPlaying=true;playLine();} }
function pNext(){ stopSpeak(); if(pIdx<pArr.length-1){pIdx++;} pPlaying=true; playLine(); }
function pPrev(){ stopSpeak(); if(pIdx>0){pIdx--;} pPlaying=true; playLine(); }

/* ----- QUIZ / EXAMEN ----- */
let qList=[], qIdx=0, qScore=0, qTitle="", qBackKey=null;
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function quiz(key){
  qBackKey=key; qTitle=MATIERES[key].nom;
  qList=shuffle(MATIERES[key].quiz); qIdx=0; qScore=0; askQ();
}
function examen(){
  qBackKey=null; qTitle="Examen blanc";
  let pool=[];
  for(const k in MATIERES) for(const q of MATIERES[k].quiz) pool.push(q);
  qList=shuffle(pool).slice(0,15); qIdx=0; qScore=0; askQ();
}
function askQ(){
  if(qIdx>=qList.length) return finQuiz();
  const [q,r,k]=qList[qIdx];
  const back = qBackKey? `go(()=>matiere('${qBackKey}'))` : `go(home)`;
  h(`<div class="top"><button class="back" onclick="${back}">←</button><b>${qTitle}</b></div>
    <div class="progress"><i style="width:${qIdx/qList.length*100}%"></i></div>
    <div class="score">Question ${qIdx+1}/${qList.length} · Score ${qScore}</div>
    <div class="card"><div class="big">${q}</div>
      <input type="text" id="rep" placeholder="Ta réponse..." autocomplete="off">
      <div class="row">
        <button class="mic" onclick="micAnswer()">🎤 Parler</button>
        <button onclick="valider()">Valider</button>
      </div>
    </div>`);
  speak(q,'A');
  setTimeout(()=>{const i=document.getElementById('rep'); if(i) i.focus();},200);
}
function micAnswer(){ listen(t=>{ const i=document.getElementById('rep'); if(i){i.value=t; valider();} }); }
function valider(){
  const v=document.getElementById('rep').value;
  const [q,r,k]=qList[qIdx];
  const ok=evaluer(v,k); if(ok) qScore++;
  stopSpeak();
  const verdict = ok
    ? `<div class="verdict vok"><b>✅ Bonne réponse !</b><br>Formulation idéale : ${r}</div>`
    : `<div class="verdict vko"><b>❌ Pas tout à fait.</b><br>Réponse attendue : ${r}</div>`;
  const back = qBackKey? `go(()=>matiere('${qBackKey}'))` : `go(home)`;
  h(`<div class="top"><button class="back" onclick="${back}">←</button><b>${qTitle}</b></div>
    <div class="card"><div class="big">${q}</div>
      <div style="color:var(--mut);font-size:14px">Ta réponse : « ${v||'—'} »</div>
      ${verdict}</div>
    <div class="row">
      <button onclick="${ok?'next()':'selfOk()'}">${ok?'Suivante →':"Je l'avais juste"}</button>
      <button class="ghost" onclick="next()">${ok?'':'Suivante →'}</button>
    </div>`);
  speak(ok? "Bonne réponse, bravo. "+r : "Pas tout à fait. La réponse attendue : "+r, 'A');
}
function selfOk(){ qScore++; next(); }
function next(){ stopSpeak(); qIdx++; askQ(); }
function finQuiz(){
  const note=Math.round(qScore/qList.length*200)/10;
  let msg = note>=16?"Excellent, tu es prêt pour lundi ! 🎉"
    : note>=12?"Bien ! Reprends les questions ratées et refais un tour."
    : note>=8?"Tu progresses — repasse par le cours podcast puis refais le quiz."
    : "Pas de panique : écoute d'abord le cours podcast, puis reviens.";
  const back = qBackKey? `go(()=>matiere('${qBackKey}'))` : `go(home)`;
  h(`<div class="top"><button class="back" onclick="go(home)">←</button><b>Résultat</b></div>
    <div class="card" style="text-align:center">
      <div style="font-size:54px;font-weight:700">${note}<span style="font-size:24px;color:var(--mut)">/20</span></div>
      <div class="score">${qScore} bonnes réponses sur ${qList.length}</div>
      <div class="big">${msg}</div>
    </div>
    <div class="row"><button onclick="${back}">↻ Recommencer</button>
      <button class="ghost" onclick="go(home)">Accueil</button></div>`);
  speak(`Terminé. ${qScore} sur ${qList.length}, soit ${note} sur 20. ${msg}`,'A');
}

home();
</script>
</body>
</html>
