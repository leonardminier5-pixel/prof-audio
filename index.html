/* ===================== VOIX ===================== */
let VOICES=[], vA=null, vB=null;
function pickVoices(){
  VOICES = speechSynthesis.getVoices();
  const fr = VOICES.filter(v=>/^fr/i.test(v.lang));
  const pool = fr.length?fr:VOICES;
  // voix A : préfère féminine; voix B : une autre voix distincte
  const female = pool.find(v=>/(elo|julie|aud|amelie|female|google|siri.*1|virginie|c[ée]line)/i.test(v.name));
  vA = female || pool[0] || null;
  vB = pool.find(v=>v!==vA) || vA;
}
speechSynthesis.onvoiceschanged = pickVoices;
pickVoices();

function speak(text, who, onend){
  const u = new SpeechSynthesisUtterance(text);
  u.lang='fr-FR';
  if(who==='B'){ u.voice=vB; u.pitch=0.85; u.rate=1.02; }
  else { u.voice=vA; u.pitch=1.05; u.rate=0.97; }
  if(onend) u.onend=onend;
  speechSynthesis.speak(u);
  return u;
}
function stopSpeak(){ speechSynthesis.cancel(); if(window._profAudio){try{window._profAudio.pause();window._profAudio=null;}catch(e){}} }

/* ===================== ÉVALUATION RÉPONSE ===================== */
function norm(s){return s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").trim();}
function evaluer(rep, kgroups){
  const r = norm(rep); if(!r) return false;
  const mots = new Set(r.replace(/[,.''-]/g," ").split(/\s+/));
  let ok=0;
  for(const g of kgroups){
    if(g.some(syn=>{const s=norm(syn); return /[ \-\/]/.test(s)? r.includes(s): mots.has(s);})) ok++;
  }
  return ok >= Math.ceil(kgroups.length/2);
}

/* Mémoire du prof : résumé des cours de Léonard (sert de base de connaissances) */
const COURS_CONTEXT = `
CONNAISSANCES DES COURS DE LEONARD (etudiant B1 a PSTB, oral lundi) :

== DEV WEB ==
HTML (HyperText Markup Language) : langage de balisage qui STRUCTURE le contenu (pas la mise en forme). Balises paires (p, div) et orphelines (br, img, input, hr). Attribut name OBLIGATOIRE sur input pour recuperer la valeur en PHP. Lien = balise a avec href. Tableau : table>tr>th(en-tete)/td(donnee). Formulaire : form action+method.
CSS (Cascading Style Sheets) : gere la presentation. 3 facons : en ligne (style), interne (balise style), externe (fichier .css via link, recommande). Selecteurs : .classe (reutilisable), #id (unique). Modele de boite : contenu + padding (interieur) + border + margin (exterieur). Flexbox (display:flex) pour aligner.

== PYTHON ==
Variable = nom vers une valeur en memoire, typage dynamique. Types : int, float, str, bool, None. input() renvoie TOUJOURS une str (convertir avec int()). Conditions if/elif/else, bloc delimite par INDENTATION (4 espaces) + deux-points. Operateurs : ==, !=, and, or, not. Boucles : for (sequence connue), while (tant que vrai), break (sort), continue (tour suivant), range(n)=0 a n-1. Structures : liste [] ordonnee modifiable, tuple () immuable, dictionnaire {} paires cle:valeur, index commence a 0, .append() pour ajouter. Fonctions : def, return (sans return renvoie None), variable locale = portee. Qualite : PEP 8, snake_case, constantes MAJUSCULES, DRY (ne te repete pas), try/except.
PROJET PYTHON de Leonard = "contactbook.py" : carnet de contacts en ligne de commande (CLI) qui ajoute/affiche/recherche/modifie/supprime des contacts. Un contact = un dictionnaire (cles : numero, nom, prenom, telephone, email). Tous les contacts = une liste. Donnees CHIFFREES avec Fernet (chiffrement symetrique : meme cle pour chiffrer/dechiffrer, fichiers key.key et contacts.enc). Validation email/telephone sans regex. Point d'entree : if __name__=="__main__": main(). Pas de version graphique (contactbook_gui.py est vide).

== RESEAUX ==
Modele OSI (Open System Interconnection, propose par l'ISO, annees 70) : 7 couches. Du BAS vers le HAUT : Physique, Liaison, Reseau, Transport, Session, Presentation, Application. Mnemo : "Partout La-bas Roule Ton Super Petit Avion". Unites : Physique=bit, Liaison=trame, Reseau=paquet, Transport=segment. Adresse MAC = couche 2 (Liaison). Adresse IP = couche 3 (Reseau). Equipements : Hub (couche 1, ne segmente pas les collisions), Switch (couche 2, adresse MAC), Routeur (couche 3, IP, SEUL a separer les domaines de broadcast). Box = routeur + switch + modem. TCP = avec connexion, fiable (lettre recommandee) ; UDP = sans connexion, rapide, sans garantie (lettre simple). CSMA/CD gere les collisions Ethernet. Spanning-Tree (802.1d) evite les boucles. Modele DoD/TCP-IP = 4 couches.

function getKey(){ return localStorage.getItem("gemini_key") || ""; }

async function geminiGenerate(history){
  const key = getKey();
  const body = {
    systemInstruction:{ parts:[{ text: SYSTEM_PROMPT }] },
    contents: history.map(m=>({ role:m.role, parts:m.parts })),
    tools:[{ google_search:{} }],
    generationConfig:{ temperature:0.7 }
  };
  const url = "https://generativelanguage.googleapis.com/v1beta/models/"+CHAT_MODEL+":generateContent?key="+encodeURIComponent(key);
  const res = await fetch(url,{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });
  if(!res.ok){ let e; try{e=(await res.json()).error.message;}catch(_){e=await res.text();} throw new Error("Chat "+res.status+" — "+e); }
  const data = await res.json();
  const cand = data.candidates && data.candidates[0];
  let text="";
  if(cand && cand.content && cand.content.parts) text = cand.content.parts.map(p=>p.text||"").join("");
  let sources=[];
  const gm = cand && cand.groundingMetadata;
  if(gm && gm.groundingChunks) sources = gm.groundingChunks.map(c=>c.web&&c.web.uri).filter(Boolean);
  return { text: text.trim()||"(je n'ai pas de reponse, reformule ta question)", sources };

/* --- Voix neuronale Gemini : renvoie une URL audio (WAV) jouable --- */
async function geminiTTS(text){
  const key = getKey();
  const body = {
    contents:[{ parts:[{ text: text }] }],
    generationConfig:{ responseModalities:["AUDIO"],
      speechConfig:{ voiceConfig:{ prebuiltVoiceConfig:{ voiceName: TTS_VOICE } } } }
  };
  const url = "https://generativelanguage.googleapis.com/v1beta/models/"+TTS_MODEL+":generateContent?key="+encodeURIComponent(key);
  const res = await fetch(url,{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });
  if(!res.ok) throw new Error("TTS "+res.status);
  const data = await res.json();
  const part = data.candidates[0].content.parts.find(p=>p.inlineData);
  if(!part) throw new Error("TTS: pas d'audio");
  return pcmToWavUrl(part.inlineData.data, part.inlineData.mimeType||"audio/L16;rate=24000");
}
function pcmToWavUrl(b64, mime){
  const bin=atob(b64), n=bin.length, bytes=new Uint8Array(n);
  for(let i=0;i<n;i++) bytes[i]=bin.charCodeAt(i);
  let rate=24000; const m=/rate=(\d+)/.exec(mime); if(m) rate=parseInt(m[1],10);
  const ch=1, bits=16, blockAlign=ch*bits/8, byteRate=rate*blockAlign;
  const buf=new ArrayBuffer(44+bytes.length), v=new DataView(buf);
  const ws=(o,s)=>{ for(let i=0;i<s.length;i++) v.setUint8(o+i,s.charCodeAt(i)); };
  ws(0,"RIFF"); v.setUint32(4,36+bytes.length,true); ws(8,"WAVE"); ws(12,"fmt ");
  v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,ch,true);
  v.setUint32(24,rate,true); v.setUint32(28,byteRate,true); v.setUint16(32,blockAlign,true);
  v.setUint16(34,bits,true); ws(36,"data"); v.setUint32(40,bytes.length,true);
  new Uint8Array(buf,44).set(bytes);
  return URL.createObjectURL(new Blob([buf],{type:"audio/wav"}));
}

function cleanForTTS(t){ return t.replace(/[*#`_>]/g," ").replace(/\[(\d+)\]/g,"").replace(/\s+/g," ").trim(); }

/* --- rendu markdown leger + echappement --- */
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function mdToHtml(t){
  let s=esc(t);
  s=s.replace(/\*\*([^*]+)\*\*/g,"<b>$1</b>").replace(/`([^`]+)`/g,"<code>$1</code>");
  return s;
}
